version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: markdown2pdf
    main: ./cmd/markdown2pdf
    binary: markdown2pdf
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: dlouwers
    name: markdown2pdf

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: markdown2pdf
    repository:
      owner: dlouwers
      name: homebrew-markdown2pdf
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/dlouwers/markdown2pdf"
    description: "Convert Markdown with code blocks, diagrams, and images to PDF"
    license: "MIT"
    install: |
      bin.install "markdown2pdf"
    test: |
      system "#{bin}/markdown2pdf", "--version"
