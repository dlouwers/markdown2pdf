name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint, test, and build in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: |
            golangci-lint run --timeout=5m ./...
            go test -race -coverprofile=coverage.out ./...
            go vet ./...
            CGO_ENABLED=0 go build -trimpath -o /dev/null ./cmd/markdown2pdf
