name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Verify build
        run: CGO_ENABLED=0 go build -trimpath -o /dev/null ./cmd/markdown2pdf

      - name: Run vet
        run: go vet ./...
